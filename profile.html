<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | SwayamStore</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2563eb; --employee-bg: #eff6ff; --employee-border: #bfdbfe; }
        body { font-family: 'Poppins', sans-serif; background: #f1f5f9; margin: 0; padding-bottom: 90px; }
        
        /* Profile Header */
        .profile-hero { background: var(--primary); color: white; padding: 40px 20px; text-align: center; border-radius: 0 0 30px 30px; }
        .user-pic { width: 85px; height: 85px; background: white; border-radius: 50%; margin: 0 auto 15px; line-height: 85px; font-size: 45px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .user-name { font-size: 22px; font-weight: 700; margin: 0; }
        .user-phone { font-size: 13px; opacity: 0.9; }

        /* Menu Groups */
        .menu-container { padding: 20px; }
        .menu-group { background: white; border-radius: 20px; overflow: hidden; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.03); }
        
        .menu-item { display: flex; align-items: center; gap: 15px; padding: 18px 20px; text-decoration: none; color: #334155; border-bottom: 1px solid #f1f5f9; transition: 0.2s; }
        .menu-item:last-child { border-bottom: none; }
        .menu-item:active { background: #f8fafc; }
        .menu-item i { font-style: normal; font-size: 20px; width: 25px; }
        .menu-text { flex-grow: 1; font-weight: 500; font-size: 15px; }
        .arrow { color: #cbd5e1; font-size: 14px; }

        /* Special Employee Section Styling */
        .employee-section { background: var(--employee-bg); border: 1.5px solid var(--employee-border); }
        .employee-section i { color: var(--primary); }
        .tag-new { background: var(--primary); color: white; font-size: 10px; padding: 2px 8px; border-radius: 10px; margin-left: 8px; vertical-align: middle; }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #e2e8f0; }
        .nav-link { text-decoration: none; color: #64748b; font-size: 11px; text-align: center; }
        .nav-link.active { color: var(--primary); font-weight: bold; }
        .nav-icon { display: block; font-size: 20px; }
    </style>
</head>
<body>

    <div class="profile-hero">
        <div class="user-pic">👤</div>
        <p class="user-name">Namaste, Customer!</p>
        <span class="user-phone">+91 98XXX-XXXXX</span>
    </div>

    <div class="menu-container">
        
        <div class="menu-group employee-section">
            <a href="admin.html" class="menu-item">
                <i>💼</i>
                <div class="menu-text">
                    Employee Section <span class="tag-new">AGENT LOGIN</span>
                    <div style="font-size: 11px; color: #64748b; font-weight: normal;">Dukan aur Product add karne ke liye</div>
                </div>
                <span class="arrow">➔</span>
            </a>
        </div>

        <div class="menu-group">
            <a href="#" class="menu-item">
                <i>📦</i>
                <div class="menu-text">My Orders</div>
                <span class="arrow">➔</span>
            </a>
            <a href="address.html" class="menu-item">
                <i>📍</i>
                <div class="menu-text">Saved Addresses</div>
                <span class="arrow">➔</span>
            </a>
            <a href="#" class="menu-item">
                <i>💳</i>
                <div class="menu-text">Payment Methods</div>
                <span class="arrow">➔</span>
            </a>
        </div>

        <div class="menu-group">
            <a href="#" class="menu-item">
                <i>📞</i>
                <div class="menu-text">Customer Support</div>
                <span class="arrow">➔</span>
            </a>
            <a href="login.html" class="menu-item" style="color: #ef4444;">
                <i>🚪</i>
                <div class="menu-text">Logout</div>
            </a>
        </div>

    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-link">
            <span class="nav-icon">🏠</span>Home
        </a>
        <a href="#" class="nav-link">
            <span class="nav-icon">📦</span>Orders
        </a>
        <a href="cart.html" class="nav-link">
            <span class="nav-icon">🛒</span>Cart
        </a>
        <a href="profile.html" class="nav-link active">
            <span class="nav-icon">👤</span>Profile
        </a>
    </nav>

</body>
</html>
