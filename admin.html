<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwayamStore | Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f1f5f9; margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
        
        /* Admin Header */
        .admin-nav { background: #1e293b; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .admin-nav b { font-size: 18px; color: #38bdf8; }

        .container { padding: 20px; max-width: 800px; margin: 0 auto; width: 100%; box-sizing: border-box; }

        /* Stats Row */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .stat-box { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-left: 4px solid #2563eb; }
        .stat-box small { color: #64748b; font-size: 12px; }
        .stat-box div { font-size: 20px; font-weight: 700; color: #1e293b; }

        /* Form Card */
        .admin-card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 25px; }
        h3 { margin-top: 0; font-size: 16px; color: #1e293b; border-bottom: 1px solid #f1f5f9; padding-bottom: 10px; }

        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 5px; color: #475569; }
        input, select, textarea { width: 100%; padding: 10px; border: 1.5px solid #e2e8f0; border-radius: 8px; outline: none; box-sizing: border-box; }
        
        .btn-add { background: #2563eb; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: 600; cursor: pointer; }

        /* Recent Orders Table */
        .order-row { background: white; padding: 15px; border-radius: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; font-size: 13px; border: 1px solid #e2e8f0; }
        .status-pending { background: #fef3c7; color: #92400e; padding: 2px 8px; border-radius: 5px; font-weight: 600; }
    </style>
</head>
<body>

    <nav class="admin-nav">
        <div><b>SwayamStore</b> Admin</div>
        <div style="font-size: 12px;">Welcome, Rakesh</div>
    </nav>

    <div class="container">
        
        <div class="stats-grid">
            <div class="stat-box">
                <small>Total Sales</small>
                <div>₹12,450</div>
            </div>
            <div class="stat-box" style="border-color: #059669;">
                <small>Active Orders</small>
                <div>08</div>
            </div>
        </div>

        <div class="admin-card">
            <h3>➕ Naya Product Add Karein</h3>
            <form id="productForm">
                <div class="input-group">
                    <label>Product ka Naam</label>
                    <input type="text" placeholder="e.g. Sambalpuri Saree, Basmati Rice" required>
                </div>
                <div class="input-group">
                    <label>Category</label>
                    <select>
                        <option>Grocery</option>
                        <option>Fashion</option>
                        <option>Electronics</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Price (₹)</label>
                    <input type="number" placeholder="0.00" required>
                </div>
                <div class="input-group">
                    <label>Product Image Link (URL)</label>
                    <input type="text" placeholder="https://image-link.com">
                </div>
                <button type="button" class="btn-add" onclick="alert('Product Added Successfully!')">List Product</button>
            </form>
        </div>

        <h3>📦 Recent Orders</h3>
        <div class="order-row">
            <div>
                <b>#SS-102</b> - Rakesh P.<br>
                <small>Wireless Headphones - ₹999</small>
            </div>
            <span class="status-pending">Pending</span>
        </div>
        
        <div class="order-row">
            <div>
                <b>#SS-101</b> - Amit Kumar<br>
                <small>Basmati Rice 5kg - ₹450</small>
            </div>
            <span class="status-pending" style="background:#dcfce7; color:#166534;">Delivered</span>
        </div>

    </div>

</body>
</html>
