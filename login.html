<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SwayamStore</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f1f5f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 350px; text-align: center; }
        .logo { background: #2563eb; color: white; width: 50px; height: 50px; border-radius: 12px; line-height: 50px; font-weight: bold; font-size: 24px; margin: 0 auto 15px; }
        h2 { margin-bottom: 5px; color: #1e293b; }
        p { color: #64748b; font-size: 14px; margin-bottom: 25px; }
        .input-group { text-align: left; margin-bottom: 15px; }
        label { display: block; font-size: 13px; color: #475569; margin-bottom: 5px; font-weight: 600; }
        input { width: 100%; padding: 12px; border: 1.5px solid #e2e8f0; border-radius: 10px; box-sizing: border-box; outline: none; }
        input:focus { border-color: #2563eb; }
        .forgot { text-align: right; margin-bottom: 20px; }
        .forgot a { font-size: 12px; color: #2563eb; text-decoration: none; }
        .btn { width: 100%; background: #2563eb; color: white; border: none; padding: 13px; border-radius: 10px; font-weight: 600; cursor: pointer; }
        .footer { margin-top: 20px; font-size: 13px; color: #64748b; }
        .footer a { color: #2563eb; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>

<div class="card">
    <div class="logo">S</div>
    <h2>Welcome Back</h2>
    <p>Login to your SwayamStore account</p>
    
    <form onsubmit="event.preventDefault(); location.href='index.html';">
        <div class="input-group">
            <label>Mobile Number / Email</label>
            <input type="text" placeholder="Enter details" required>
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" placeholder="••••••••" required>
        </div>
        <div class="forgot"><a href="#">Forgot Password?</a></div>
        <button type="submit" class="btn">Login</button>
    </form>

    <div class="footer">
        Don't have an account? <a href="signup.html">Sign Up</a>
    </div>
</div>

</body>
</html>
