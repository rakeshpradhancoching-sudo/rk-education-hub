<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwayamStore | Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* CSS Pehle wala hi hai, bas styling thodi clean ki hai */
        :root { --primary: #2563eb; --bg: #f8fafc; }
        body { font-family: 'Poppins', sans-serif; margin: 0; background: var(--bg); padding-bottom: 80px; }
        .header { background: var(--primary); color: white; padding: 20px; border-radius: 0 0 20px 20px; position: sticky; top: 0; z-index: 100; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; }
        .search-box { background: white; margin-top: 15px; border-radius: 10px; padding: 10px; display: flex; align-items: center; }
        .search-box input { border: none; outline: none; width: 100%; margin-left: 10px; }
        
        .section-header { padding: 20px; display: flex; justify-content: space-between; font-weight: bold; }
        .cat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 0 20px; }
        .cat-item { text-align: center; text-decoration: none; color: #1e293b; }
        .cat-icon { background: white; height: 60px; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 25px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #e2e8f0; }
        .nav-link { text-decoration: none; color: #64748b; font-size: 11px; text-align: center; }
        .nav-link.active { color: var(--primary); font-weight: bold; }
        .nav-icon { display: block; font-size: 20px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="top-bar">
            <div class="brand" onclick="location.href='index.html'" style="cursor:pointer;">Swayam<b>Store</b></div>
            <div style="font-size: 12px;">
                <a href="login.html" style="color: white; text-decoration: none;">Login</a>
            </div>
        </div>
        <div class="search-box">
            <span>🔍</span>
            <input type="text" placeholder="Search for products...">
        </div>
    </div>

    <div class="section-header">Categories</div>
    <div class="cat-grid">
        <div class="cat-item"><div class="cat-icon">🍎</div><small>Grocery</small></div>
        <div class="cat-item"><div class="cat-icon">📱</div><small>Mobile</small></div>
        <div class="cat-item"><div class="cat-icon">👕</div><small>Fashion</small></div>
        <div class="cat-item"><div class="cat-icon">🧴</div><small>Beauty</small></div>
    </div>

    <div class="section-header">New Arrivals</div>
    <div style="padding: 0 20px;">
        <div style="background: white; padding: 15px; border-radius: 15px; display: flex; align-items: center; gap: 15px; margin-bottom: 15px;">
            <div style="font-size: 40px;">🎧</div>
            <div style="flex-grow: 1;">
                <b>Wireless Headset</b><br>
                <span style="color: green;">₹999</span>
            </div>
            <button onclick="location.href='cart.html'" style="background: var(--primary); color: white; border: none; padding: 8px 15px; border-radius: 8px;">Add</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-link active">
            <span class="nav-icon">🏠</span>Home
        </a>
        <a href="orders.html" class="nav-link">
            <span class="nav-icon">📦</span>Orders
        </a>
        <a href="cart.html" class="nav-link">
            <span class="nav-icon">🛒</span>Cart
        </a>
        <a href="profile.html" class="nav-link">
            <span class="nav-icon">👤</span>Profile
        </a>
    </nav>

</body>
</html>
